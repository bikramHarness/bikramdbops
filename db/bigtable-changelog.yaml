databaseChangeLog:
  - changeSet:
      id: create-logical-view-daily-active-users
      author: harness
      changes:
        - createBigtableLogicalView:
            name: daily_active_users
            query: >
              SELECT user_id, COUNT(event_id) as event_count
              FROM `my_project.raw_data.events`
              GROUP BY user_id

