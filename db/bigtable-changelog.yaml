databaseChangeLog:
  - changeSet:
      id: 1-create-table
      author: harness
      changes:
        - createBigtableTable:
            tableName: user_events
            columnFamilies:
              - name: profile
                gcRule:
                  maxNumVersions: 3
              - name: activity
                gcRule:
                  maxAge: 30d
      rollback:
        - deleteBigtableTable:
            tableName: user_events

  - changeSet:
     id: 2-create-column-family
     author: harness
     changes:
       - createColumnFamily:
           tableName: user_events
           familyName: preferences
           gcRule:
             maxNumVersions: 5
     rollback:
       - deleteColumnFamily:
           tableName: user_events
           familyName: preferences
