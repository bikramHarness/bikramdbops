databaseChangeLog:
  - changeSet:
      id: 1
      author: harness
      changes:
        - createBigtableTable:
            tableName: users
            columnFamilies:
              - name: profile
                gcRule:
                  maxNumVersions: 3
              - name: orders
                gcRule:
                  maxAge: 30d
              - name: audit
                gcRule:
                  union:
                    - maxNumVersions: 5
                    - maxAge: 90d

